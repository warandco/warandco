<!DOCTYPE html>

  <link rel="stylesheet" href="css/style.css" />

<body>

  <nav class="nav" id="nav">
    <a href="index.html" class="nav__logo" aria-label="War & Co home">
      <img src="WandCo.svg" alt="W&Co" width="40" height="32" />
    </a>
    <button class="nav__hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">

    <ul class="nav__links" id="nav-links">
      <li><a href="index.html" class="nav__link nav__link--active">Work</a></li>
      <li><a href="about.html" class="nav__link">About</a></li>
      <li><a href="contact.html" class="nav__link">Contact</a></li>
    </ul>
  </nav>

  <div class="project">

    <header class="project__header">
      <div>
        <a href="index.html" class="project__back">All work</a>
        <span class="card__index">01</span>
      </div>
      <div>
        <h1 class="project__title">Venom Vodka</h1>
        <p class="project__desc">A premium spirits brand built for the dark side of celebration — bold identity system from concept to bottle.</p>

    <div class="project__body">
      <aside class="project__sidebar">
        <p class="project__sidebar-label">Role</p>

        <div class="project__img" style="aspect-ratio:16/9; background:#1a1a1a; border-radius:3px;"></div>

          <div class="project__img" style="aspect-ratio:1; background:#111; border-radius:3px;"></div>
          <div class="project__img" style="aspect-ratio:1; background:#222; border-radius:3px;"></div>
        </div>
        <div class="project__img" style="aspect-ratio:16/9; background:#1a1a1a; border-radius:3px;"></div>
