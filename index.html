<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>War & Co — Brand Identity & Design</title>
  <meta name="description" content="War & Co is an independent brand identity studio based in Las Vegas, NV." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #ffffff;
      color: #111111;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }
    .card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 48px;
      max-width: 480px;
      width: 100%;
    }
    .card__logo img { height: 36px; width: auto; display: block; }
    .card__body { display: flex; flex-direction: column; gap: 6px; }
    .card__studio { font-size: 15px; font-weight: 400; color: #111111; }
    .card__location { font-size: 15px; font-weight: 300; color: #888888; }
    .card__links { display: flex; flex-direction: column; gap: 12px; }
    .card__link {
      font-size: 14px;
      font-weight: 400;
      color: #ef6a54;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .card__link:hover { opacity: 0.7; }
    .card__bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }
    .card__meta {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .card__coords {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 10px;
      font-weight: 300;
      color: #cccccc;
      letter-spacing: 0.06em;
    }
    .card__copy { font-size: 12px; font-weight: 300; color: #cccccc; }
    .card__ig { color: #cccccc; transition: color 0.2s; display: flex; align-items: center; }
    .card__ig:hover { color: #ef6a54; }
    .card__ig svg { width: 16px; height: 16px; fill: currentColor; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card__logo">
      <img src="images/WandCo.svg" alt="War & Co" />
    </div>
    <div class="card__body">
      <p class="card__studio">Independent brand identity studio.</p>
      <p class="card__location">Las Vegas, NV</p>
    </div>
    <div class="card__links">
      <a href="mailto:contact@warandco.com" class="card__link">contact@warandco.com</a>
    </div>
    <div class="card__bottom">
      <div class="card__meta">
        <span class="card__coords">36.1716° N / 115.1391° W</span>
        <span class="card__copy">© 2026 War & Company</span>
      </div>
      <a href="https://www.instagram.com/warandcompany" class="card__ig" target="_blank" rel="noopener" aria-label="Instagram">
