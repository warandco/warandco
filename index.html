<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>War & Co — Brand Identity & Design</title>
  <meta name="description" content="War & Co is an independent design studio specializing in logo design, brand identity, packaging, merchandise and digital design." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8JQYXETXCD"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8JQYXETXCD');
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #f0ede8;
      color: #2c2c2a;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      grid-template-rows: 56px 1fr 56px;
      min-height: 100vh;
    }

    .br { border-right: 1px solid #d8d4ce; }
    .bb { border-bottom: 1px solid #d8d4ce; }
    .bt { border-top: 1px solid #d8d4ce; }
    .white { background: #ffffff; }

    /* NAV — no vertical lines, full white bar */
    .nav-logo {
      grid-column: 1;
      grid-row: 1;
      display: flex;
      align-items: center;
      padding: 0 28px;
    }

    .nav-logo img {
      height: 22px;
      width: auto;
      filter: brightness(0);
    }

    .nav-empty {
      grid-column: 2 / 4;
      grid-row: 1;
    }

    .nav-contact {
      grid-column: 4;
      grid-row: 1;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 28px;
    }

    .nav-contact a {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      color: #ef6a54;
      text-transform: uppercase;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .nav-contact a:hover { opacity: 0.7; }

    /* MAIN */
    .main-left {
      grid-column: 1 / 3;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 16px;
      padding: 28px 28px 40px;
    }

    .main-right {
      grid-column: 3 / 5;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 28px 28px 40px;
    }

    .main-right-inner {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .label {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      color: #a8a49e;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
      animation-delay: 0.2s;
    }

    .main-right .label { animation-delay: 0.3s; }

    .main-left h1 {
      font-size: clamp(40px, 5vw, 64px);
      font-weight: 600;
      line-height: 1.0;
      letter-spacing: -0.02em;
      color: #2c2c2a;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.1s;
      will-change: transform;
    }

    .main-right p {
      font-size: 15px;
      font-weight: 300;
      color: #5f5e5a;
      line-height: 1.75;
      max-width: 280px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.4s;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .nav-logo img,
    .nav-contact a {
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
      animation-delay: 0.05s;
    }

    .nav-contact a { animation-delay: 0.1s; }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .footer-copy,
    .footer-coords,
    .footer-ig a {
      opacity: 0;
      animation: fadeIn 0.6s ease forwards;
      animation-delay: 0.5s;
    }

    .footer-coords { animation-delay: 0.6s; }
    .footer-ig a { animation-delay: 0.7s; }

    /* FOOTER */
    .footer-copy {
      grid-column: 1;
      grid-row: 3;
      display: flex;
      align-items: center;
      padding: 0 28px;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 9px;
      color: #a8a49e;
      letter-spacing: 0.06em;
    }

    .footer-coords {
      grid-column: 2 / 4;
      grid-row: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 28px;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 9px;
      color: #a8a49e;
      letter-spacing: 0.06em;
    }

    .footer-ig {
      grid-column: 4;
      grid-row: 3;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 28px;
    }

    .footer-ig a {
      color: #a8a49e;
      display: flex;
      align-items: center;
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-ig a:hover { color: #ef6a54; }
    .footer-ig svg { width: 14px; height: 14px; fill: currentColor; }

    /* Parallax layers */
    .parallax-slow { will-change: transform; }
    .parallax-fast { will-change: transform; }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 48px 1fr 1fr 48px;
        min-height: 100vh;
      }

      .nav-logo { grid-column: 1; grid-row: 1; padding: 0 20px; }
      .nav-empty { display: none; }
      .nav-contact { grid-column: 2; grid-row: 1; padding: 0 20px; }

      .main-left {
        grid-column: 1 / 3;
        grid-row: 2;
        padding: 24px 20px 32px;
        border-right: none;
      }

      .main-right {
        grid-column: 1 / 3;
        grid-row: 3;
        padding: 24px 20px 32px;
        border-top: 1px solid #d8d4ce;
      }

      .main-left h1 { font-size: clamp(32px, 9vw, 48px); }
      .main-right p { max-width: 100%; }

      .footer-copy { grid-column: 1; grid-row: 4; padding: 0 20px; }
      .footer-coords { display: none; }
      .footer-ig { grid-column: 2; grid-row: 4; padding: 0 20px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="grid">

    <div class="nav-logo white bb">
      <img src="images/WandCo.svg" alt="War & Co" />
    </div>
    <div class="nav-empty white bb"></div>
    <div class="nav-contact white bb">
      <a href="mailto:contact@warandco.com">Contact</a>
    </div>

    <div class="main-left br">
      <span class="label">Las Vegas, NV</span>
      <h1 class="parallax-slow">Independent<br>design studio.</h1>
    </div>
    <div class="main-right">
      <div class="main-right-inner parallax-fast">
        <span class="label">Work</span>
        <p>Logo design, brand identity, packaging, merchandise and digital design.</p>
      </div>
    </div>

    <div class="footer-copy br bt">© 2026 War & Company</div>
    <div class="footer-coords br bt">36.1716° N / 115.1391° W</div>
    <div class="footer-ig bt">
      <a href="https://www.instagram.com/warandcompany" target="_blank" rel="noopener" aria-label="Instagram">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
        </svg>
      </a>
    </div>

  </div>

  <script>
    const headline = document.querySelector('.parallax-slow');
    const workBlock = document.querySelector('.parallax-fast');

    let mouseX = 0;
    let mouseY = 0;
    let currentX = 0;
    let currentY = 0;
    let rafId;

    document.addEventListener('mousemove', (e) => {
      // Normalize mouse position to -1 to 1
      mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
      mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
    });

    function lerp(start, end, factor) {
      return start + (end - start) * factor;
    }

    function animate() {
      // Smooth interpolation toward mouse position
      currentX = lerp(currentX, mouseX, 0.05);
      currentY = lerp(currentY, mouseY, 0.05);

      // Headline moves slowly opposite to mouse — depth illusion
      const headlineX = currentX * -8;
      const headlineY = currentY * -6;

      // Work block moves slightly faster in same direction
      const workX = currentX * 4;
      const workY = currentY * 3;

      headline.style.transform = `translate(${headlineX}px, ${headlineY}px)`;
      workBlock.style.transform = `translate(${workX}px, ${workY}px)`;

      rafId = requestAnimationFrame(animate);
    }

    // Only run on non-touch devices
    if (window.matchMedia('(hover: hover)').matches) {
      animate();
    }
  </script>
</body>
</html>
