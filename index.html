<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>War & Co — Brand Identity & Design</title>
  <meta name="description" content="War & Co is an independent brand identity studio based in Las Vegas, NV." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8JQYXETXCD"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8JQYXETXCD');
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #111111; --white: #ffffff; --gray: #4a4a4a; }
    html, body { height: 100%; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }
    .card { display: flex; flex-direction: column; align-items: flex-start; gap: 40px; max-width: 480px; width: 100%; }
    .card__logo img { height: 36px; width: auto; display: block; }
    .card__body { display: flex; flex-direction: column; gap: 6px; }
    .card__studio { font-size: 14px; font-weight: 400; color: var(--black); }
    .card__location { font-size: 14px; font-weight: 300; color: var(--gray); }
    .card__links { display: flex; flex-direction: column; gap: 10px; }
    .card__link { font-size: 14px; font-weight: 400; color: var(--gray); text-decoration: none; transition: color 0.2s; }
    .card__link:hover { color: var(--black); }
    .card__copy { font-size: 12px; font-weight: 300; color: #aaa; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card__logo">
      <img src="images/WandCo.svg" alt="War & Co" />
    </div>
    <div class="card__body">
      <p class="card__studio">Independent brand identity studio.</p>
      <p class="card__location">Las Vegas, NV</p>
    </div>
    <div class="card__links">
      <a href="mailto:contact@warandco.com" class="card__link">contact@warandco.com</a>
      <a href="https://www.instagram.com/warandcompany" class="card__link" target="_blank" rel="noopener">@warandcompany</a>
    </div>
    <p class="card__copy">© 2026 War & Co</p>
  </div>
</body>
</html>
