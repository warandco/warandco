    .border-t { border-top: 1px solid #d8d4ce; }

    .nav-logo {

      grid-row: 1;
      display: flex;
      align-items: center;
      padding: 0 28px;

    .nav-logo img {
      height: 22px;
      width: auto;
    }

    .nav-logo span {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: #2c2c2a;
      text-transform: uppercase;
    }

    .nav-empty {
      grid-column: 2 / 4;
      grid-row: 1;
    }
